    * { box-sizing: border-box; }
    body { font-family: 'Exo 2', 'Noto Sans TC', sans-serif; background: #0F172A; color: #F8FAFC; margin: 0; }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(34,197,94,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(34,197,94,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridShift 20s linear infinite;
    }
    @keyframes gridShift {
      to { background-position: 60px 60px; }
    }

    /* Scroll snap */
    .snap-container { scroll-snap-type: y proximity; }
    .snap-section { scroll-snap-align: start; }

    /* Card glow on hover */
    .bento-card {
      transition: transform 250ms ease, box-shadow 250ms ease, border-color 250ms ease;
    }
    .bento-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 0 40px rgba(34,197,94,0.25), 0 20px 60px rgba(0,0,0,0.4);
      border-color: rgba(34,197,94,0.5);
    }
    .bento-card:focus-visible {
      outline: 2px solid #22C55E;
      outline-offset: 2px;
    }

    /* Staggered reveal */
    .bento-card {
      opacity: 0;
      transform: translateY(30px);
      animation: cardReveal 0.6s ease forwards;
    }
    @keyframes cardReveal {
      to { opacity: 1; transform: translateY(0); }
    }

    /* Count-up */
    .count-up { font-variant-numeric: tabular-nums; }

    /* View toggle */
    .view-btn { transition: background 200ms, color 200ms; }
    .view-btn.active { background: #22C55E; color: #0F172A; }
    .view-btn:hover:not(.active) { background: #334155; }
    .view-btn:focus-visible { outline: 2px solid #22C55E; outline-offset: 2px; }

    /* Modal / Drawer */
    .modal-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(15,23,42,0.85); backdrop-filter: blur(8px);
      opacity: 0; pointer-events: none;
      transition: opacity 300ms ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: auto; }
    .modal-panel {
      position: fixed; top: 0; right: 0; z-index: 51;
      width: min(480px, 90vw); height: 100vh;
      background: #1E293B; border-left: 1px solid rgba(34,197,94,0.3);
      transform: translateX(100%);
      transition: transform 300ms ease;
      overflow-y: auto;
    }
    .modal-overlay.open + .modal-panel,
    .modal-panel.open { transform: translateX(0); }

    /* Status pill colors */
    .status-done { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }
    .status-active { background: rgba(56,189,248,0.15); color: #38bdf8; border: 1px solid rgba(56,189,248,0.3); }
    .status-paused { background: rgba(251,191,36,0.15); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
    .status-planned { background: rgba(251,146,60,0.15); color: #fb923c; border: 1px solid rgba(251,146,60,0.3); }
    .status-core { background: rgba(168,85,247,0.15); color: #a855f7; border: 1px solid rgba(168,85,247,0.3); }
    .status-running { background: rgba(34,197,94,0.15); color: #4ade80; border: 1px solid rgba(34,197,94,0.3); }

    /* Graph section */
    #graphSection svg { width: 100%; height: 100%; }

    /* prefers-reduced-motion */
    @media (prefers-reduced-motion: reduce) {
      .bento-card { animation: none; opacity: 1; transform: none; }
      .bento-card:hover { transform: none; }
      body::before { animation: none; }
      @keyframes gridShift { to { background-position: 0 0; } }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0F172A; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }

    /* Progress panel */
    .progress-panel {
      position: fixed; bottom: 1.5rem; left: 1.5rem; width: 320px; max-height: 70vh;
      background: rgba(15,23,42,0.92); backdrop-filter: blur(12px);
      border: 1px solid rgba(56,189,248,0.2); border-radius: 16px;
      padding: 1.2rem; overflow-y: auto; z-index: 50;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      transition: transform 0.3s ease, opacity 0.3s ease;
    }
    .progress-panel.collapsed { transform: translateY(calc(100% - 44px)); }
    .progress-toggle { cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.8rem; }
    .progress-toggle h3 { font-family: 'Orbitron', monospace; font-size: 0.75rem; color: #94a3b8; letter-spacing: 0.08em; text-transform: uppercase; margin: 0; }
    .progress-toggle span { color: #64748b; font-size: 0.7rem; }
    .progress-item { margin-bottom: 0.7rem; cursor: pointer; padding: 0.3rem 0; }
    .progress-item:hover .progress-name { color: #38bdf8; }
    .progress-label { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
    .progress-name { color: #cbd5e1; font-size: 0.75rem; font-weight: 500; transition: color 0.2s; }
    .progress-pct { color: #64748b; font-size: 0.65rem; }
    .progress-bar { height: 5px; background: rgba(30,41,59,0.8); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 3px; transition: width 1.5s cubic-bezier(0.4,0,0.2,1); }
    .fill-done { background: linear-gradient(90deg, #22c55e, #4ade80); }

    .fill-planned { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    @media (max-width: 768px) { .progress-panel { width: calc(100% - 2rem); left: 1rem; bottom: 1rem; } }

      { id: "obsidian", name: "Obsidian 知識庫", layer: "infra", group: "基礎設施", status: "運行中", statusKey: "running", desc: "所有專案的知識沉澱終點：筆記、MOC、儀表板", importance: 15, tags: ["第二大腦"] },
      { id: "telegram", name: "Telegram", layer: "infra", group: "基礎設施", status: "運行中", statusKey: "running", desc: "人機溝通主介面", importance: 12, tags: ["通訊"] },
      { id: "github", name: "GitHub", layer: "infra", group: "基礎設施", status: "運行中", statusKey: "running", desc: "程式碼託管 + Pages 公開分享", importance: 13, tags: ["版本管理", "Pages"] },
    ];

    const links = [
      ...["cat_trade", "cat_med", "cat_ai", "cat_content"].map(id => ({ source: "core", target: id, strength: 0.7 })),
      ...["macmini", "win4060", "openclaw", "obsidian", "telegram", "github"].map(id => ({ source: "core", target: id, strength: 0.45 })),
      { source: "cat_trade", target: "trade_bible", strength: 0.6 },
      { source: "cat_trade", target: "trading_system", strength: 0.5 },
      { source: "cat_trade", target: "bitfinex", strength: 0.5 },
      { source: "cat_trade", target: "poly", strength: 0.4 },
      { source: "cat_med", target: "pocus", strength: 0.6 },
      { source: "cat_ai", target: "apple_notes", strength: 0.5 },
      { source: "cat_ai", target: "skill_dev", strength: 0.55 },
      { source: "cat_content", target: "ig_med", strength: 0.55 },
      { source: "cat_content", target: "speech", strength: 0.5 },
      { source: "cat_content", target: "pocus", strength: 0.35 },
      { source: "trade_bible", target: "macmini", strength: 0.3 },
      { source: "trade_bible", target: "win4060", strength: 0.3 },
      { source: "pocus", target: "obsidian", strength: 0.35 },
      { source: "pocus", target: "github", strength: 0.3 },
      { source: "apple_notes", target: "obsidian", strength: 0.35 },
      { source: "skill_dev", target: "openclaw", strength: 0.4 },
      { source: "skill_dev", target: "obsidian", strength: 0.3 },
      { source: "ig_med", target: "github", strength: 0.25 },
      { source: "speech", target: "obsidian", strength: 0.3 },
      { source: "openclaw", target: "telegram", strength: 0.3 },
      { source: "trade_bible", target: "trading_system", strength: 0.35 },
      { source: "cat_trade", target: "signal_bot", strength: 0.45 },
      { source: "cat_ai", target: "rdog", strength: 0.5 },
      { source: "signal_bot", target: "telegram", strength: 0.35 },
      { source: "signal_bot", target: "github", strength: 0.3 },
      { source: "rdog", target: "obsidian", strength: 0.35 },
    ];

    // ===== STATUS HELPERS =====
    function getStatusClass(node) {
      const s = node.statusKey || '';
      const status = node.status || '';
      if (s === 'done' || /完成|穩定/.test(status)) return 'status-done';
      if (s === 'active' || /進行|持續|擴充/.test(status)) return 'status-active';
      if (s === 'paused' || /等待|暫停/.test(status)) return 'status-paused';
      if (s === 'planned' || /計劃|草稿|規劃/.test(status)) return 'status-planned';
      if (s === 'running' || /運行/.test(status)) return 'status-running';
      if (s === 'core' || /核心/.test(status)) return 'status-core';
      return 'status-active';
    }

    // ===== BENTO GRID =====
    function getSpan(node) {
      if (node.layer === 'center') return 'md:col-span-2 md:row-span-2';
      if (node.importance >= 28) return 'md:col-span-2';
      if (node.importance >= 22) return 'md:col-span-1 md:row-span-2';
      return '';
    }

    // Section definitions for categorized grid view
    const gridSections = [
      { title: '投資與交易', icon: 'trending-up', nodeIds: ['trade_bible', 'trading_system', 'bitfinex', 'signal_bot', 'poly'] },
      { title: '醫學與知識', icon: 'book-open', nodeIds: ['pocus'] },
      { title: 'AI 與自動化', icon: 'cpu', nodeIds: ['apple_notes', 'skill_dev', 'rdog'] },
      { title: '內容與輸出', icon: 'share-2', nodeIds: ['ig_med', 'speech'] },
      { title: '基礎設施', icon: 'server', nodeIds: ['macmini', 'win4060', 'openclaw', 'obsidian', 'telegram', 'github'] },
    ];

    function createCard(node, delay) {
      const span = getSpan(node);
      const icon = iconMap[node.id] || 'circle';
      const card = document.createElement('div');
      card.className = `bento-card bg-primary border border-secondary rounded-3xl p-6 cursor-pointer ${span}`;
      card.style.animationDelay = `${delay}ms`;
      card.tabIndex = 0;
      card.setAttribute('role', 'button');
      card.setAttribute('aria-label', `查看 ${node.name} 詳細資訊`);

      const tagHtml = (node.tags || []).slice(0, 4).map(t =>
        `<span class="text-xs font-body px-2.5 py-1 rounded-full bg-secondary text-dim">${t}</span>`
      ).join('');

      card.innerHTML = `
        <div class="flex items-start justify-between mb-4">
          <div class="w-12 h-12 rounded-2xl bg-bg flex items-center justify-center border border-secondary">
            <i data-lucide="${icon}" class="w-6 h-6 text-cta"></i>
          </div>
          <span class="text-xs font-body font-semibold px-3 py-1 rounded-full ${getStatusClass(node)}">${node.status}</span>
        </div>
        <h3 class="font-display text-lg font-bold tracking-wide mb-2">${node.name}</h3>
        <p class="font-body text-dim text-sm leading-relaxed mb-4 line-clamp-3">${node.desc || ''}</p>
        <div class="flex flex-wrap gap-1.5">${tagHtml}</div>
      `;

      card.addEventListener('click', () => openDrawer(node));
      card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openDrawer(node); } });
      return card;
    }

    function renderBentoGrid() {
      const container = document.getElementById('bentoGrid');
      container.innerHTML = '';
      container.className = 'space-y-12';
      let globalDelay = 0;

      // Hero card: VC × Jarvis
      const coreNode = nodes.find(n => n.id === 'core');
      if (coreNode) {
        const heroCard = createCard(coreNode, globalDelay);
        heroCard.className = 'bento-card bg-primary border border-secondary rounded-3xl p-6 cursor-pointer col-span-full';
        heroCard.style.animationDelay = `${globalDelay}ms`;
        const heroGrid = document.createElement('div');
        heroGrid.className = 'grid grid-cols-1 gap-5';
        heroGrid.appendChild(heroCard);
        container.appendChild(heroGrid);
        globalDelay += 60;
      }

      // Render each section
      gridSections.forEach(section => {
        const sectionEl = document.createElement('div');

        // Section header
        const header = document.createElement('div');
        header.className = 'flex items-center gap-4 mb-6';
        header.innerHTML = `
          <div class="w-10 h-10 rounded-xl bg-bg flex items-center justify-center border border-secondary flex-shrink-0">
            <i data-lucide="${section.icon}" class="w-5 h-5 text-cta"></i>
          </div>
          <h2 class="font-display text-2xl font-bold tracking-wider text-txt">${section.title}</h2>
          <div class="flex-1 h-px bg-gradient-to-r from-secondary to-transparent"></div>
        `;
        sectionEl.appendChild(header);

        // Cards grid
        const grid = document.createElement('div');
        grid.className = 'grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-5 auto-rows-min';

        section.nodeIds.forEach(id => {
          const node = nodes.find(n => n.id === id);
          if (!node) return;
          grid.appendChild(createCard(node, globalDelay));
          globalDelay += 60;
        });

        sectionEl.appendChild(grid);
        container.appendChild(sectionEl);
      });

      lucide.createIcons();
    }

    // ===== DRAWER =====
    function openDrawer(node) {
      const overlay = document.getElementById('modalOverlay');
      const panel = document.getElementById('modalPanel');
      const content = document.getElementById('modalContent');
      const icon = iconMap[node.id] || 'circle';

      const metricsHtml = node.metrics ? Object.entries(node.metrics).map(([k, v]) =>
        `<div class="flex justify-between items-center py-3 border-b border-secondary">
          <span class="text-dim text-sm">${k}</span>
          <span class="font-body font-semibold text-sm">${v}</span>
        </div>`
      ).join('') : '';

      const childrenHtml = (node.children && node.children.length) ?
        `<div class="mt-6">
          <h4 class="font-display text-sm tracking-widest text-dim uppercase mb-3">Sub-items</h4>
          <div class="space-y-2">${node.children.map(c =>
            `<div class="flex items-center gap-3 text-sm font-body text-txt/80">
              <i data-lucide="chevron-right" class="w-3 h-3 text-cta flex-shrink-0"></i>${c}
            </div>`
          ).join('')}</div>
        </div>` : '';

      const tagHtml = (node.tags || []).map(t =>
        `<span class="text-xs font-body px-3 py-1.5 rounded-full border border-secondary text-dim">${t}</span>`
      ).join('');

      const linkHtml = node.link ?
        `<a href="${node.link}" target="_blank" rel="noopener"
           class="inline-flex items-center gap-2 mt-6 px-5 py-3 bg-cta text-bg font-body font-bold text-sm rounded-xl cursor-pointer transition-all duration-200 hover:brightness-110 focus-visible:outline focus-visible:outline-2 focus-visible:outline-cta focus-visible:outline-offset-2">
          <i data-lucide="external-link" class="w-4 h-4"></i>Open Link
        </a>` : '';

      content.innerHTML = `
        <button id="closeDrawer" class="absolute top-6 right-6 w-10 h-10 flex items-center justify-center rounded-xl bg-bg border border-secondary cursor-pointer transition-colors duration-200 hover:border-cta focus-visible:outline focus-visible:outline-2 focus-visible:outline-cta" aria-label="Close">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
        <div class="w-16 h-16 rounded-2xl bg-bg flex items-center justify-center border border-secondary mb-6">
          <i data-lucide="${icon}" class="w-8 h-8 text-cta"></i>
        </div>
        <span class="text-xs font-body font-semibold px-3 py-1 rounded-full ${getStatusClass(node)}">${node.status}</span>
        <h2 class="font-display text-2xl font-bold tracking-wide mt-4 mb-2">${node.name}</h2>
        <p class="font-body text-dim leading-relaxed mb-6">${node.desc || ''}</p>
        ${metricsHtml ? `<div class="mb-2">${metricsHtml}</div>` : ''}
        ${childrenHtml}
        <div class="mt-6">
          <h4 class="font-display text-sm tracking-widest text-dim uppercase mb-3">Tags</h4>
          <div class="flex flex-wrap gap-2">${tagHtml}</div>
        </div>
        ${linkHtml}
      `;

      overlay.classList.add('open');
      panel.classList.add('open');
      lucide.createIcons();

      document.getElementById('closeDrawer').addEventListener('click', closeDrawer);
      overlay.addEventListener('click', closeDrawer);
    }

    function closeDrawer() {
      document.getElementById('modalOverlay').classList.remove('open');
      document.getElementById('modalPanel').classList.remove('open');
    }
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDrawer(); });

    // ===== D3 FORCE GRAPH =====
    const palette = { center: '#a855f7', category: '#fb923c', project: '#60a5fa', infra: '#34d399' };

    function drawGraph() {
      const svg = d3.select('#graph');
      svg.selectAll('*').remove();
      const rect = svg.node().getBoundingClientRect();
      const w = rect.width, h = rect.height;
      svg.attr('viewBox', [0, 0, w, h]);

      const g = svg.append('g');

      // Glow filter
      const defs = svg.append('defs');
      const filter = defs.append('filter').attr('id', 'nodeGlow');
      filter.append('feGaussianBlur').attr('stdDeviation', '4').attr('result', 'blur');
      const merge = filter.append('feMerge');
      merge.append('feMergeNode').attr('in', 'blur');
      merge.append('feMergeNode').attr('in', 'SourceGraphic');

      const nodesCopy = nodes.map(d => ({...d}));
      const linksCopy = links.map(d => ({...d}));

      const link = g.append('g').selectAll('line').data(linksCopy).join('line')
        .attr('stroke', 'rgba(148,16已全額借出,0.2)')
        .attr('stroke-width', d => 0.5 + d.strength * 2);

      const node = g.append('g').selectAll('g').data(nodesCopy).join('g').style('cursor', 'pointer');

      const radius = d => d.layer === 'center' ? 28 : Math.max(8, d.importance * 0.55);

      node.append('circle')
        .attr('r', radius)
        .attr('fill', d => palette[d.layer])
        .attr('filter', 'url(#nodeGlow)')
        .attr('opacity', 0.9);

      node.append('text')
        .text(d => d.name)
        .attr('text-anchor', 'middle')
        .attr('dy', d => -radius(d) - 8)
        .attr('fill', '#F8FAFC')
        .attr('font-family', 'Exo 2, sans-serif')
        .attr('font-size', d => d.layer === 'center' ? 13 : 11)
        .attr('font-weight', 600)
        .attr('paint-order', 'stroke')
        .attr('stroke', '#0F172A')
        .attr('stroke-width', 3);

      const sim = d3.forceSimulation(nodesCopy)
        .force('link', d3.forceLink(linksCopy).id(d => d.id).distance(d => 60 + (1 - d.strength) * 80))
        .force('charge', d3.forceManyBody().strength(d => d.layer === 'center' ? -600 : -250))
        .force('collision', d3.forceCollide().radius(d => radius(d) + 10))
        .force('center', d3.forceCenter(w / 2, h / 2));

      sim.on('tick', () => {
        link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
            .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        node.attr('transform', d => `translate(${d.x},${d.y})`);
      });

      const drag = d3.drag()
        .on('start', (e, d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
        .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
        .on('end', (e, d) => { if (!e.active) sim.alphaTarget(0); d.fx = null; d.fy = null; });

      node.call(drag).on('click', (_, d) => {
        const orig = nodes.find(n => n.id === d.id);
        if (orig) openDrawer(orig);
      });

      svg.call(d3.zoom().scaleExtent([0.3, 3]).on('zoom', e => g.attr('transform', e.transform)));
    }

    // ===== VIEW TOGGLE =====
    document.querySelectorAll('.view-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.view-btn').forEach(b => {
          b.classList.remove('active');
          b.classList.add('bg-primary', 'text-dim', 'border', 'border-secondary');
        });
        btn.classList.add('active');
        btn.classList.remove('bg-primary', 'text-dim', 'border', 'border-secondary');

        const view = btn.dataset.view;
        document.getElementById('gridView').classList.toggle('hidden', view !== 'grid');
        document.getElementById('graphSection').classList.toggle('hidden', view !== 'graph');
        if (view === 'graph') {
          setTimeout(drawGraph, 50);
        }
      });
    });

    // ===== COUNT UP =====
    function countUp() {
      const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
      document.querySelectorAll('.count-up').forEach(el => {
        const target = parseInt(el.dataset.target);
        if (reducedMotion) { el.textContent = target; return; }
        let current = 0;
        const step = Math.ceil(target / 30);
        const timer = setInterval(() => {
          current += step;
          if (current >= target) { current = target; clearInterval(timer); }
          el.textContent = current;
        }, 40);
      });
    }

    // ===== BOOT =====
    renderBentoGrid();
    countUp();
  </script>

  <div class="progress-panel" id="progressPanel">
    <div class="progress-toggle" onclick="toggleProgress()">
      <h3>📊 專案進度</h3>
      <span id="progressToggleIcon">▼</span>
    </div>
    <div id="progressBars"></div>
  </div>
  <script>
    const progressData = [
      { id: "apple_notes", name: "Apple Notes 精煉", pct: 100, cls: "fill-done", detail: "穩定運行" },
      { id: "rdog", name: "RDOG Skill", pct: 100, cls: "fill-done", detail: "v1.0 定版" },
      { id: "trading_system", name: "自動下單", pct: 95, cls: "fill-done", detail: "上線 + 去重" },
      { id: "signal_bot", name: "Signal Bot", pct: 95, cls: "fill-done", detail: "每日 21:00" },
      { id: "bitfinex", name: "Bitfinex 放貸", pct: 90, cls: "fill-done", detail: "Live USDT 全額借出" },
      { id: "speech", name: "養蝦心得", pct: 90, cls: "fill-done", detail: "簡報完成" },
      { id: "trade_bible", name: "交易聖經", pct: 75, cls: "fill-active", detail: "V11 訓練中" },
      { id: "skill_dev", name: "Skill 開發", pct: 70, cls: "fill-active", detail: "持續擴充" },
      { id: "pocus", name: "Obsidian 知識庫", pct: 60, cls: "fill-active", detail: "7/20+ 主題" },
      { id: "ig_med", name: "IG 醫美粉專", pct: 40, cls: "fill-active", detail: "8 篇待審" },
      { id: "poly", name: "Polymarket 套利", pct: 10, cls: "fill-planned", detail: "計劃階段" },
    ];
    function renderProgress() {
      const container = document.getElementById('progressBars');
      container.innerHTML = progressData.map(p => `
        <div class="progress-item" onclick="document.querySelectorAll('circle').forEach(c => { if(c.__data__ && c.__data__.id==='${p.id}') c.dispatchEvent(new Event('click')); })">
          <div class="progress-label">
            <span class="progress-name">${p.name}</span>
            <span class="progress-pct">${p.pct}% · ${p.detail}</span>
          </div>
          <div class="progress-bar">
            <div class="progress-fill ${p.cls}" style="width:0%"></div>
          </div>
        </div>
      `).join('');
      // Animate bars
      setTimeout(() => {
        container.querySelectorAll('.progress-fill').forEach((el, i) => {
          el.style.width = progressData[i].pct + '%';
        });
      }, 300);
    }
    function toggleProgress() {
      const panel = document.getElementById('progressPanel');
      const icon = document.getElementById('progressToggleIcon');
      panel.classList.toggle('collapsed');
      icon.textContent = panel.classList.contains('collapsed') ? '▲' : '▼';
    }
    renderProgress();
  </script>
